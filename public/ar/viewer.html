<!DOCTYPE html>
<html lang="id">
  <head>
    <meta charset="utf-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no"
    />
    <title>NATURA AR</title>
    <!-- Versi yang terbukti bekerja: A-Frame 1.5.0 + MindAR 1.2.5 -->
    <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>
    <style>
      html,
      body {
        margin: 0;
        width: 100%;
        height: 100%;
        overflow: hidden;
        font-family: system-ui, -apple-system, sans-serif;
        touch-action: none;
      }
      .back {
        position: fixed;
        top: 12px;
        left: 12px;
        z-index: 10000;
        background: rgba(0, 0, 0, 0.55);
        color: #fff;
        text-decoration: none;
        font: 600 14px system-ui, sans-serif;
        padding: 8px 14px;
        border-radius: 999px;
      }
      #hint {
        position: fixed;
        left: 0;
        right: 0;
        top: 12px;
        text-align: center;
        z-index: 9998;
        pointer-events: none;
      }
      #hint span {
        background: rgba(0, 0, 0, 0.5);
        color: #fff;
        font: 500 12px system-ui, sans-serif;
        padding: 6px 12px;
        border-radius: 999px;
      }
      #msg {
        position: fixed;
        inset: 0;
        z-index: 10001;
        display: none;
        place-items: center;
        background: #0b0f1a;
        color: #fff;
        text-align: center;
        padding: 24px;
      }
      #msg[data-show="1"] {
        display: grid;
      }
      #overlay {
        position: fixed;
        left: 0;
        right: 0;
        bottom: 0;
        z-index: 9999;
        background: #fff;
        border-radius: 18px 18px 0 0;
        padding: 16px 18px calc(18px + env(safe-area-inset-bottom, 0px));
        box-shadow: 0 -6px 24px rgba(0, 0, 0, 0.18);
        max-height: 42%;
        overflow: auto;
      }
      #overlay[hidden] {
        display: none;
      }
      #overlay-back {
        background: transparent;
        border: none;
        color: #1537f9;
        font: 600 13px system-ui, sans-serif;
        padding: 0;
        margin-bottom: 8px;
        cursor: pointer;
      }
      #overlay-back[hidden] {
        display: none;
      }
      #overlay .badge {
        display: inline-block;
        background: rgba(21, 55, 249, 0.1);
        color: #1537f9;
        font-size: 11px;
        font-weight: 700;
        padding: 2px 9px;
        border-radius: 999px;
        text-transform: uppercase;
        letter-spacing: 0.04em;
      }
      #overlay h3 {
        margin: 8px 0 6px;
        font-size: 18px;
        color: #171b2e;
      }
      #overlay p {
        margin: 0;
        font-size: 13px;
        line-height: 1.55;
        color: #3a3f55;
      }
      #overlay ul {
        margin: 0;
        padding-left: 18px;
        font-size: 13px;
        line-height: 1.55;
        color: #333;
      }
      #overlay li {
        margin-bottom: 5px;
      }
    </style>
  </head>
  <body>
    <a id="back" href="/natulab/ar" class="back">← Keluar AR</a>
    <div id="hint"><span>Ketuk layar untuk membuka · seret = putar · cubit = zoom · 2 jari = geser</span></div>

    <div id="msg"><div><p id="msg-text"></p></div></div>

    <div id="overlay" hidden>
      <button id="overlay-back" type="button" hidden>← Kembali ke penjelasan umum</button>
      <span class="badge" id="overlay-badge"></span>
      <h3 id="overlay-title"></h3>
      <div id="overlay-body"></div>
    </div>

    <!--
      PENTING (lihat memori proyek): scene AR ditulis STATIS di HTML dan dimuat
      lewat navigasi halaman penuh. JANGAN membangun <a-scene> secara dinamis
      via JS / iframe / A-Frame 1.6.0 → menyebabkan kamera hitam.
      Yang data-driven hanya *nilai*: imageTargetSrc & src model di-set lebih
      awal (script sinkron di bawah, sebelum A-Frame boot), dan titik anotasi
      ditambahkan sebagai child entity setelah data diambil.
    -->
    <a-scene
      id="scene"
      color-space="sRGB"
      renderer="colorManagement: true, physicallyCorrectLights"
      vr-mode-ui="enabled: false"
      device-orientation-permission-ui="enabled: false"
    >
      <a-assets>
        <a-asset-item id="arModel"></a-asset-item>
      </a-assets>

      <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

      <a-entity id="targetEntity" mindar-image-target="targetIndex: 0">
        <a-entity class="activator">
          <a-circle
            radius="0.12"
            color="#1537f9"
            opacity="0.85"
            animation="property: scale; to: 1.15 1.15 1.15; dir: alternate; loop: true; dur: 800; easing: easeInOutSine"
          ></a-circle>
          <a-text
            value="Ketuk untuk buka"
            align="center"
            color="#ffffff"
            width="1.4"
            position="0 -0.22 0.01"
          ></a-text>
        </a-entity>

        <a-entity class="content" visible="false">
          <a-gltf-model
            id="arGltf"
            rotation="0 0 0"
            position="0 0 0.1"
            scale="1 1 1"
          ></a-gltf-model>
          <a-entity class="annotations" visible="false"></a-entity>
        </a-entity>
      </a-entity>
    </a-scene>

    <!-- Set nilai dinamis SINKRON, sebelum A-Frame menginit sistem mindar. -->
    <script>
      (function () {
        var qs = new URLSearchParams(location.search);
        var target = qs.get("target") || "";
        var model = qs.get("model") || "";
        var id = qs.get("id") || "";
        var type = qs.get("type") === "tool" ? "alat" : "tanaman";

        var backEl = document.getElementById("back");
        if (id) backEl.setAttribute("href", "/natulab/" + type + "/" + id);

        if (target) {
          document
            .getElementById("scene")
            .setAttribute(
              "mindar-image",
              "imageTargetSrc: " + target + "; uiScanning: no;",
            );
        }
        if (model) {
          document.getElementById("arModel").setAttribute("src", model);
          document.getElementById("arGltf").setAttribute("src", "#arModel");
        } else {
          var g = document.getElementById("arGltf");
          if (g && g.parentNode) g.parentNode.removeChild(g);
        }
      })();
    </script>

    <script>
      document.addEventListener("DOMContentLoaded", function () {
        "use strict";
        var THREE = AFRAME.THREE;

        var qs = new URLSearchParams(location.search);
        var type = qs.get("type") === "tool" ? "tool" : "plant";
        var id = qs.get("id") || "";
        var target = qs.get("target") || "";

        var msgEl = document.getElementById("msg");
        var msgText = document.getElementById("msg-text");
        if (!target) {
          msgText.textContent =
            "Target AR (.mind) belum tersedia untuk konten ini. Kembali dan gunakan mode 3D.";
          msgEl.setAttribute("data-show", "1");
        }

        // Label anotasi selalu menghadap kamera.
        AFRAME.registerComponent("face-camera", {
          init: function () {
            this._c = new THREE.Quaternion();
            this._p = new THREE.Quaternion();
          },
          tick: function () {
            var cam = this.el.sceneEl && this.el.sceneEl.camera;
            if (!cam) return;
            cam.getWorldQuaternion(this._c);
            var parent = this.el.object3D.parent;
            if (parent) {
              parent.getWorldQuaternion(this._p);
              this._p.invert();
              this.el.object3D.quaternion.copy(this._p).multiply(this._c);
            } else {
              this.el.object3D.quaternion.copy(this._c);
            }
          },
        });

        var scene = document.getElementById("scene");
        var annotationsWrap = scene.querySelector(".annotations");
        var hintEl = document.getElementById("hint");
        var overlayEl = document.getElementById("overlay");
        var overlayBack = document.getElementById("overlay-back");
        var overlayBadge = document.getElementById("overlay-badge");
        var overlayTitle = document.getElementById("overlay-title");
        var overlayBody = document.getElementById("overlay-body");

        // ---- Data (info umum + anotasi) ----
        var general = { badge: "", title: "NATURA", body: "" };
        var parts = {}; // partKey -> { title, body[] }

        function v3(a) {
          a = a || [];
          return (a[0] || 0) + " " + (a[1] || 0) + " " + (a[2] || 0);
        }

        function buildAnnotations(list) {
          list.forEach(function (a) {
            var key = a.partKey || "";
            parts[key] = { title: a.label || key, body: a.body || [] };

            var ann = document.createElement("a-entity");
            ann.setAttribute("class", "annotation");
            ann.dataset.part = key;
            ann.setAttribute("position", v3(a.pos));
            ann.setAttribute(
              "line",
              "start: 0 0 0; end: " +
                v3(a.labelPos) +
                "; color: #D98A3D; opacity: 0.9",
            );

            var sphere = document.createElement("a-sphere");
            sphere.setAttribute("radius", "0.02");
            sphere.setAttribute("color", "#D98A3D");
            ann.appendChild(sphere);

            var labelLen = (a.label || "").length;
            var planeW = Math.max(1.2, labelLen * 0.28 + 0.6);
            var label = document.createElement("a-entity");
            label.setAttribute("class", "label");
            label.setAttribute("face-camera", "");
            label.setAttribute("position", v3(a.labelPos));
            label.setAttribute("scale", "0.24 0.24 0.24");
            label.innerHTML =
              '<a-plane color="#ffffff" opacity="0.95" width="' +
              planeW +
              '" height="0.7"></a-plane>' +
              '<a-text value="' +
              (a.label || "") +
              '" color="#171b2e" align="center" width="' +
              (planeW - 0.2) +
              '" position="0 0 0.01"></a-text>';
            ann.appendChild(label);

            annotationsWrap.appendChild(ann);
          });
        }

        // Ambil data; scene tetap jalan walau fetch gagal (info minimal).
        if (id) {
          fetch("/api/ar/" + type + "/" + encodeURIComponent(id))
            .then(function (r) {
              return r.ok ? r.json() : null;
            })
            .then(function (data) {
              if (!data) return;
              if (data.general) {
                general.badge = data.general.badge || "";
                general.title = data.general.title || "NATURA";
                general.body = data.general.body || "";
              }
              if (Array.isArray(data.annotations))
                buildAnnotations(data.annotations);
            })
            .catch(function () {});
        }

        // ---- Overlay & interaksi ----
        var activeObj = null;
        var foundTargets = new Set();

        function setActive(contentEl) {
          activeObj = contentEl ? contentEl.object3D : null;
        }
        function showOverlayGeneral() {
          overlayBadge.textContent = general.badge;
          overlayTitle.textContent = general.title;
          overlayBody.innerHTML = "<p>" + (general.body || "") + "</p>";
          overlayBack.hidden = true;
        }
        function showOverlayPart(key) {
          var p = parts[key];
          if (!p) return;
          overlayBadge.textContent =
            type === "tool" ? "Bagian alat" : "Bagian tanaman";
          overlayTitle.textContent = p.title;
          overlayBody.innerHTML =
            "<ul>" +
            p.body
              .map(function (x) {
                return "<li>" + x + "</li>";
              })
              .join("") +
            "</ul>";
          overlayBack.hidden = false;
        }
        overlayBack.addEventListener("click", showOverlayGeneral);

        function activate(t) {
          if (!t) return;
          var c = t.querySelector(".content");
          var act = t.querySelector(".activator");
          if (act) act.setAttribute("visible", "false");
          if (c) {
            c.setAttribute("visible", "true");
            t.dataset.activated = "1";
            setActive(c);
          }
          t.querySelectorAll(".annotations").forEach(function (a) {
            a.setAttribute("visible", "true");
          });
          showOverlayGeneral();
          overlayEl.hidden = false;
          if (hintEl) hintEl.style.display = "none";
        }

        var raycaster = new THREE.Raycaster();
        var ndc = new THREE.Vector2();
        function pickLabel(clientX, clientY) {
          var canvas = scene.canvas;
          var cam = scene.camera;
          if (!canvas || !cam) return null;
          var rect = canvas.getBoundingClientRect();
          ndc.x = ((clientX - rect.left) / rect.width) * 2 - 1;
          ndc.y = -((clientY - rect.top) / rect.height) * 2 + 1;
          raycaster.setFromCamera(ndc, cam);
          var meshes = [];
          foundTargets.forEach(function (t) {
            if (!t.dataset.activated) return;
            t.querySelectorAll(".label").forEach(function (label) {
              var part = label.parentNode.dataset.part;
              label.object3D.traverse(function (o) {
                if (o.isMesh) {
                  o.userData._part = part;
                  meshes.push(o);
                }
              });
            });
          });
          if (!meshes.length) return null;
          var hits = raycaster.intersectObjects(meshes, false);
          return hits.length ? hits[0].object.userData._part : null;
        }

        function handleTap(x, y) {
          if (x != null) {
            var part = pickLabel(x, y);
            if (part) {
              showOverlayPart(part);
              return;
            }
          }
          var toOpen = null;
          foundTargets.forEach(function (t) {
            if (!t.dataset.activated) toOpen = t;
          });
          if (toOpen) activate(toOpen);
        }

        scene.addEventListener("loaded", function () {
          document
            .querySelectorAll("[mindar-image-target]")
            .forEach(function (t) {
              t.addEventListener("targetFound", function () {
                foundTargets.add(t);
                if (t.dataset.activated) setActive(t.querySelector(".content"));
              });
              t.addEventListener("targetLost", function () {
                foundTargets.delete(t);
              });
            });
          setupGestures(scene.canvas);
        });

        function setupGestures(canvas) {
          if (!canvas) return;
          var last1 = null,
            lastDist = null,
            lastMid = null,
            dragging = false,
            lastMouse = null,
            downPos = null,
            moved = false,
            downTime = 0;
          var TAP_MOVE = 12,
            TAP_MS = 600;

          canvas.addEventListener(
            "touchstart",
            function (e) {
              if (e.touches.length === 1) {
                last1 = { x: e.touches[0].clientX, y: e.touches[0].clientY };
                downPos = { x: e.touches[0].clientX, y: e.touches[0].clientY };
                moved = false;
                downTime = Date.now();
              }
              lastDist = null;
              lastMid = null;
            },
            { passive: true },
          );

          canvas.addEventListener(
            "touchmove",
            function (e) {
              if (e.touches.length === 1 && downPos) {
                var t0 = e.touches[0];
                if (
                  Math.hypot(t0.clientX - downPos.x, t0.clientY - downPos.y) >
                  TAP_MOVE
                )
                  moved = true;
              }
              if (!activeObj) return;
              e.preventDefault();
              if (e.touches.length === 1) {
                var t = e.touches[0];
                if (last1) {
                  activeObj.rotation.y += (t.clientX - last1.x) * 0.01;
                  activeObj.rotation.x += (t.clientY - last1.y) * 0.01;
                }
                last1 = { x: t.clientX, y: t.clientY };
                lastDist = null;
                lastMid = null;
              } else if (e.touches.length >= 2) {
                var a = e.touches[0],
                  b = e.touches[1];
                var dist = Math.hypot(
                  a.clientX - b.clientX,
                  a.clientY - b.clientY,
                );
                var mid = {
                  x: (a.clientX + b.clientX) / 2,
                  y: (a.clientY + b.clientY) / 2,
                };
                if (lastDist) {
                  var s = THREE.MathUtils.clamp(
                    activeObj.scale.x * (dist / lastDist),
                    0.2,
                    6,
                  );
                  activeObj.scale.set(s, s, s);
                }
                if (lastMid) {
                  activeObj.position.x += (mid.x - lastMid.x) * 0.002;
                  activeObj.position.y -= (mid.y - lastMid.y) * 0.002;
                }
                lastDist = dist;
                lastMid = mid;
                last1 = null;
              }
            },
            { passive: false },
          );

          canvas.addEventListener("touchend", function (e) {
            if (e.touches.length === 0) {
              if (!moved && downPos && Date.now() - downTime < TAP_MS) {
                var ct = e.changedTouches[0];
                handleTap(ct.clientX, ct.clientY);
              }
              downPos = null;
            }
            last1 =
              e.touches.length === 1
                ? { x: e.touches[0].clientX, y: e.touches[0].clientY }
                : null;
            lastDist = null;
            lastMid = null;
          });

          canvas.addEventListener("mousedown", function (e) {
            dragging = true;
            lastMouse = { x: e.clientX, y: e.clientY };
            downPos = { x: e.clientX, y: e.clientY };
            moved = false;
            downTime = Date.now();
          });
          window.addEventListener("mouseup", function (e) {
            if (dragging && !moved && downPos && Date.now() - downTime < TAP_MS)
              handleTap(e.clientX, e.clientY);
            dragging = false;
            downPos = null;
          });
          canvas.addEventListener("mousemove", function (e) {
            if (
              downPos &&
              Math.hypot(e.clientX - downPos.x, e.clientY - downPos.y) > TAP_MOVE
            )
              moved = true;
            if (!dragging || !activeObj || !lastMouse) return;
            activeObj.rotation.y += (e.clientX - lastMouse.x) * 0.01;
            activeObj.rotation.x += (e.clientY - lastMouse.y) * 0.01;
            lastMouse = { x: e.clientX, y: e.clientY };
          });
          canvas.addEventListener(
            "wheel",
            function (e) {
              if (!activeObj) return;
              e.preventDefault();
              var s = THREE.MathUtils.clamp(
                activeObj.scale.x * (e.deltaY < 0 ? 1.1 : 0.9),
                0.2,
                6,
              );
              activeObj.scale.set(s, s, s);
            },
            { passive: false },
          );
        }
      });
    </script>
  </body>
</html>
